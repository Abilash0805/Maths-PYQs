<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 540" width="540" height="540">
  <!-- Background -->
  <rect width="540" height="540" fill="#D6E8F7" rx="28"/>

  <!-- Open book pages (left side) -->
  <g transform="translate(60, 260)">
    <!-- Back pages -->
    <path d="M20 120 L140 100 L140 20 L20 40 Z" fill="#9DC6E8" opacity="0.5"/>
    <path d="M15 128 L135 108 L135 28 L15 48 Z" fill="#B8D8F0" opacity="0.6"/>
    <!-- Left page -->
    <path d="M10 136 L130 116 L130 16 L10 36 Z" fill="white" stroke="#3B6CB7" stroke-width="1.5" opacity="0.9"/>
    <!-- Right page (spread) -->
    <path d="M130 116 L250 136 L250 36 L130 16 Z" fill="white" stroke="#3B6CB7" stroke-width="1.5" opacity="0.9"/>
    <!-- Book spine/base -->
    <path d="M10 136 L250 136 L250 148 L10 148 Z" fill="#1A3A6B"/>
    <path d="M10 136 L250 148" stroke="#1A3A6B" stroke-width="2"/>
    <!-- Blue highlight on left cover -->
    <path d="M10 36 L130 16 L130 116 L10 136 Z" fill="#2155A4" opacity="0.15"/>
    <!-- Page lines on right page -->
    <line x1="148" y1="60" x2="235" y2="62" stroke="#AAC8E8" stroke-width="1.5"/>
    <line x1="148" y1="76" x2="235" y2="78" stroke="#AAC8E8" stroke-width="1.5"/>
    <line x1="148" y1="92" x2="235" y2="94" stroke="#AAC8E8" stroke-width="1.5"/>
  </g>

  <!-- Coordinate axes -->
  <g transform="translate(110, 100)">
    <!-- x-axis -->
    <line x1="0" y1="90" x2="180" y2="90" stroke="#1A3A6B" stroke-width="2.5"/>
    <polygon points="180,90 172,85 172,95" fill="#1A3A6B"/>
    <text x="185" y="95" font-family="serif" font-size="18" fill="#1A3A6B" font-style="italic">x</text>
    <!-- y-axis -->
    <line x1="40" y1="160" x2="40" y2="0" stroke="#1A3A6B" stroke-width="2.5"/>
    <polygon points="40,0 35,8 45,8" fill="#1A3A6B"/>
    <text x="44" y="14" font-family="serif" font-size="18" fill="#1A3A6B" font-style="italic">y</text>
    <!-- Origin label -->
    <text x="24" y="108" font-family="serif" font-size="16" fill="#1A3A6B">0</text>
    <!-- Sine-like curve (two humps) -->
    <path d="M0,90 C10,90 15,40 40,40 C65,40 75,140 100,140 C125,140 135,40 160,40 C170,40 175,65 180,65"
          fill="none" stroke="#2B7DE0" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- CLASS text (small, dark navy) -->
  <text x="290" y="148" font-family="Arial Black, sans-serif" font-weight="900"
        font-size="32" fill="#1A3A6B" letter-spacing="4">CLASS</text>

  <!-- 12 (large, bright blue) -->
  <text x="288" y="230" font-family="Arial Black, sans-serif" font-weight="900"
        font-size="105" fill="#2B7DE0">12</text>

  <!-- MATHS text -->
  <text x="60" y="310" font-family="Arial Black, sans-serif" font-weight="900"
        font-size="70" fill="#1A3A6B" letter-spacing="2">MATHS</text>

  <!-- Underline / rule -->
  <line x1="60" y1="322" x2="480" y2="322" stroke="#2B7DE0" stroke-width="3"/>

  <!-- PYQS with dashes -->
  <text x="160" y="370" font-family="Arial Black, sans-serif" font-weight="700"
        font-size="34" fill="#2B7DE0" letter-spacing="6">— PYQS —</text>
</svg>
